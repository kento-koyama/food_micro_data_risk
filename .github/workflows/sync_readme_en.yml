name: Sync README.en.md tables

on:
  workflow_run:
    workflows: ["Markdown to Excel Sync", "Excel to Markdown Sync"]
    types:
      - completed
  workflow_dispatch:

jobs:
  sync_readme_en:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Sync README.md tables → README.en.md
        run: python .github/workflows/sync_readme_en.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.en.md
          git commit -m "Sync README.en.md tables from README.md" || echo "No changes"
          git pull --rebase origin main
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
